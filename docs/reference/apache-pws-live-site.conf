# Command/path note: verify and adjust paths for your own host before enabling this file.
#
# Example Apache vhost + hardening headers for the PHP dashboard.
# Keep `public/` as DocumentRoot and keep `src/` outside the served path.

<VirtualHost *:80>
    ServerName weather.example.invalid
    DocumentRoot /path/to/pws-live-site/public

    <Directory /path/to/pws-live-site/public>
        AllowOverride None
        Require all granted
        Options -Indexes +FollowSymLinks

        <IfModule mod_headers.c>
            Header always set X-Content-Type-Options "nosniff"
            Header always set Referrer-Policy "strict-origin-when-cross-origin"
            Header always set X-Frame-Options "SAMEORIGIN"
            Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
            Header always set Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src 'self' ws: wss: https:; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'"
        </IfModule>
    </Directory>

    ErrorLog /var/log/httpd/pws-live-error.log
    CustomLog /var/log/httpd/pws-live-access.log combined
</VirtualHost>
